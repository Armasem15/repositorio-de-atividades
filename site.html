<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Repositório XP</title>
    <style>
        /* Reset e Fundo */
        body {
            background: #3a6ea5 url('https://wallpaperbat.com/img/200968279-just-moved-over-to-linux-wanted-a-background-didnt-find-what-i-wanted-so-i-made-it-he-looms.png') no-repeat center center fixed;
            background-size: cover;
            font-family: "Tahoma", sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Estilo da Janela Principal */
        .window {
            background: #ece9d8;
            border: 3px solid #0055e5;
            border-radius: 8px 8px 0 0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            max-width: 900px;
            margin: 0 auto;
        }

        /* Barra de Título */
        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3b8cf8 10%, #1e71f2 50%, #1159d2 100%);
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px #003399;
            border-radius: 5px 5px 0 0;
        }

        .title-buttons img {
            height: 20px;
            cursor: pointer;
        }

        /* Menu de Navegação (Estilo Pasta) */
        .toolbar {
            background: #ece9d8;
            border-bottom: 1px solid #aca899;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Grid de Matérias */
        .content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            background: white;
            min-height: 400px;
        }

        /* Ícone da Matéria */
        .folder {
            text-align: center;
            text-decoration: none;
            color: black;
            font-size: 13px;
            padding: 10px;
            border: 1px solid transparent;
        }

        .folder:hover {
            background-color: #316ac5;
            color: white;
            border: 1px dotted #eee;
        }

        .folder img {
            width: 50px;
            height: 50px;
            display: block;
            margin: 0 auto 5px;
            image-rendering: pixelated; /* Dá aquele ar antigo */
        }

        /* Rodapé / Barra de Status */
        .status-bar {
            background: #ece9d8;
            border-top: 1px solid #aca899;
            padding: 3px 10px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
